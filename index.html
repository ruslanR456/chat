<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHP Chat App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.2s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-md bg-white shadow-lg rounded-lg overflow-hidden flex flex-col" style="height: 80vh;">
        <div class="bg-blue-600 p-4 text-white font-bold flex justify-between items-center">
            <span>Chat Room</span>
            <div id="status-dot" class="w-3 h-3 bg-gray-400 rounded-full"></div>
        </div>
        <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-3 bg-gray-50">
            <div class="text-center text-gray-400 text-sm mt-10">Connecting to server...</div>
        </div>
        <form id="chat-form" class="p-4 border-t flex gap-2">
            <input type="text" id="msg-input" placeholder="Type your message..." class="flex-1 border rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" required>
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700 transition text-sm font-semibold">Send</button>
        </form>
    </div>
    <script>
        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const msgInput = document.getElementById('msg-input');
        const statusDot = document.getElementById('status-dot');

        const API_URL = 'index.php';

        async function fetchMessages() {
            try {
                const response = await fetch(`${API_URL}?action=fetch`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                renderMessages(data);
                statusDot.className = "w-3 h-3 bg-green-500 rounded-full shadow-[0_0_8px_rgba(34,197,94,0.6)]";
            } catch (e) {
                statusDot.className = "w-3 h-3 bg-red-500 rounded-full";
            }
        }

        function renderMessages(data) {
            if (!Array.isArray(data)) return;
            chatBox.innerHTML = '';
            data.forEach(msg => {
                const div = document.createElement('div');
                div.className = "bg-white p-3 rounded-lg shadow-sm border border-gray-100 animate-fade-in";
                div.innerHTML = `<div class="flex justify-between mb-1"><strong class="text-blue-600 text-[11px]">${msg.username}</strong><span class="text-[9px] text-gray-400">${msg.created_at}</span></div><p class="text-gray-800 text-sm">${msg.message}</p>`;
                chatBox.appendChild(div);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = msgInput.value.trim();
            if (!message) return;
            try {
                const formData = new FormData();
                formData.append('message', message);
                await fetch(`${API_URL}?action=send`, { method: 'POST', body: formData });
                msgInput.value = '';
                fetchMessages();
            } catch (e) { console.error(e); }
        });

        setInterval(fetchMessages, 3000);
        fetchMessages();
    </script>
</body>
</html>
